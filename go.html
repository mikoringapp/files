<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="description" content="Secure connection gateway — encrypted redirect">
  <title>🔒 Secure Gateway</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #fff0f0 0%, #ffe0e0 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    /* Compact card – guaranteed to fit on any mobile screen without scrolling */
    .secure-card {
      max-width: 460px;
      width: 100%;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 1.5rem;
      box-shadow: 0 15px 30px -12px rgba(128, 0, 0, 0.2), 0 0 0 1px rgba(180, 60, 50, 0.1);
      text-align: center;
      padding: 1rem 1.2rem 1rem 1.2rem;
    }

    /* Lock wrapper – smaller */
    .lock-wrapper {
      margin-bottom: 0.5rem;
      display: inline-flex;
      background: #fff0ee;
      padding: 0.6rem;
      border-radius: 80px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 4px 10px rgba(180, 40, 30, 0.08);
    }

    .secure-lock {
      font-size: 2.8rem;
      color: #b33a2e;
      filter: drop-shadow(0 2px 4px rgba(160, 40, 20, 0.1));
    }

    /* Trust badge – compact */
    .trust-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #ffe6e3;
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #a53f2e;
      margin-bottom: 0.5rem;
    }

    .trust-badge i {
      font-size: 0.7rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(125deg, #942e20, #c24430);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.2rem;
      letter-spacing: -0.3px;
    }

    .secure-sub {
      color: #b64936;
      font-weight: 500;
      font-size: 0.75rem;
      border-bottom: 1px dashed #f3cdc5;
      display: inline-block;
      padding-bottom: 2px;
      margin-bottom: 0.6rem;
    }

    .info-text {
      color: #772e1f;
      font-weight: 400;
      font-size: 0.8rem;
      line-height: 1.3;
      margin: 0.4rem 0 0.5rem 0;
      background: #fff7f5;
      padding: 0.5rem 0.6rem;
      border-radius: 0.9rem;
    }

    /* Security grid – tight */
    .security-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin: 0.5rem 0 0.6rem 0;
    }

    .security-item {
      background: #fffbf9;
      border-radius: 2rem;
      padding: 0.2rem 0.7rem;
      font-size: 0.65rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: #b34430;
      border: 1px solid #ffe0da;
    }

    .security-item i {
      font-size: 0.65rem;
    }

    /* Countdown – prominently visible, no extra space */
    .countdown-area {
      margin: 0.4rem 0 0.6rem 0;
      background: #ffeae5;
      border-radius: 50px;
      padding: 0.4rem 0.8rem;
      display: inline-flex;
      align-items: baseline;
      gap: 0.4rem;
      font-weight: 600;
      color: #8f3e2c;
      font-size: 0.85rem;
    }

    .countdown-number {
      font-size: 1.6rem;
      font-weight: 800;
      color: #bc3924;
      background: white;
      padding: 0 0.3rem;
      border-radius: 40px;
      min-width: 50px;
      display: inline-block;
      font-feature-settings: "tnum";
      letter-spacing: 1px;
    }

    .redirect-btn {
      background: #bc4a36;
      border: none;
      color: white;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0.5rem 1.2rem;
      border-radius: 2.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      box-shadow: 0 4px 10px rgba(160, 60, 40, 0.2);
      margin-top: 0.1rem;
    }

    .redirect-btn i {
      font-size: 0.8rem;
    }

    .redirect-btn:active {
      transform: scale(0.97);
    }

    .footnote {
      font-size: 0.6rem;
      color: #a15a4a;
      margin-top: 0.8rem;
      border-top: 1px solid #ffe0da;
      padding-top: 0.6rem;
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .footnote i {
      font-size: 0.6rem;
    }

    /* Pulse effect */
    @keyframes softPulse {
      0% { box-shadow: 0 0 0 0 rgba(190, 70, 50, 0.2); }
      70% { box-shadow: 0 0 0 8px rgba(190, 70, 50, 0); }
      100% { box-shadow: 0 0 0 0 rgba(190, 70, 50, 0); }
    }

    .lock-wrapper {
      animation: softPulse 2s infinite;
    }

    /* Extra safe – on very small screens, reduce further */
    @media (max-height: 640px) {
      .secure-card {
        padding: 0.8rem 1rem;
      }
      .lock-wrapper {
        padding: 0.5rem;
        margin-bottom: 0.3rem;
      }
      .secure-lock {
        font-size: 2.4rem;
      }
      .info-text {
        font-size: 0.75rem;
        padding: 0.4rem 0.5rem;
        margin: 0.3rem 0;
      }
      .security-grid {
        gap: 0.4rem;
        margin: 0.3rem 0;
      }
      .countdown-number {
        font-size: 1.4rem;
        min-width: 44px;
      }
      .footnote {
        margin-top: 0.5rem;
        padding-top: 0.4rem;
      }
    }

    /* Ensure no overflow even on smallest screens */
    @media (max-width: 380px) {
      .secure-card {
        padding: 0.7rem 0.9rem;
      }
      .security-item {
        font-size: 0.6rem;
        padding: 0.15rem 0.6rem;
      }
      .countdown-area {
        padding: 0.3rem 0.7rem;
      }
      .countdown-number {
        font-size: 1.3rem;
        min-width: 40px;
      }
    }
  </style>
</head>
<body>
<div class="secure-card">
  <!-- Lock icon -->
  <div class="lock-wrapper">
    <i class="fas fa-lock secure-lock"></i>
  </div>

  <!-- Trust badge -->
  <div class="trust-badge">
    <i class="fas fa-shield-haltered"></i> 
    <span>SSL Encrypted</span>
    <i class="fas fa-check-circle"></i>
  </div>

  <h1>Secure Gateway</h1>
  <div class="secure-sub">
    <i class="fas fa-circle-check"></i> Verified Protection
  </div>

  <div class="info-text">
    <i class="fas fa-shield-alt"></i> 256‑bit TLS encryption • Safe & private
  </div>

  <!-- Security badges -->
  <div class="security-grid">
    <div class="security-item"><i class="fas fa-shield-virus"></i> Threat shield</div>
    <div class="security-item"><i class="fas fa-lock"></i> Encrypted</div>
    <div class="security-item"><i class="fas fa-id-card"></i> Verified</div>
  </div>

  <!-- Countdown timer – now fully visible without scroll -->
  <div class="countdown-area">
    <i class="fas fa-hourglass-half"></i>
    <span>Redirect in</span>
    <span class="countdown-number" id="countdownDisplay">5</span>
    <span>sec</span>
  </div>

  <!-- Manual button -->
  <button class="redirect-btn" id="manualRedirectBtn">
    <i class="fas fa-arrow-right"></i> Continue now
  </button>

  <div class="footnote">
    <span><i class="fas fa-check-circle"></i> HTTPS</span>
    <span><i class="fas fa-fingerprint"></i> Private</span>
    <span><i class="fas fa-shield"></i> Secure</span>
  </div>
</div>

<script>
  (function() {
    const SECURE_URL = "https://earnlinks.in/GOMIKOPOP";
    const countdownSpan = document.getElementById("countdownDisplay");
    const manualBtn = document.getElementById("manualRedirectBtn");
    
    let secondsLeft = 5;
    let redirectTriggered = false;
    let countdownInterval = null;

    function performRedirect() {
      if (redirectTriggered) return;
      redirectTriggered = true;
      if (countdownInterval) clearInterval(countdownInterval);
      window.location.href = SECURE_URL;
    }
    
    function updateCountdown() {
      if (redirectTriggered) return;
      if (secondsLeft <= 0) {
        if (countdownInterval) clearInterval(countdownInterval);
        performRedirect();
        return;
      }
      if (countdownSpan) countdownSpan.textContent = secondsLeft;
      secondsLeft--;
    }
    
    function startCountdown() {
      if (countdownInterval) clearInterval(countdownInterval);
      if (countdownSpan) countdownSpan.textContent = secondsLeft;
      countdownInterval = setInterval(updateCountdown, 1000);
    }
    
    function manualRedirect(e) {
      if (e) e.preventDefault();
      if (redirectTriggered) return;
      if (countdownInterval) clearInterval(countdownInterval);
      performRedirect();
    }
    
    if (manualBtn) manualBtn.addEventListener("click", manualRedirect);
    startCountdown();
    
    // Fallback safety (5.5s)
    const fallback = setTimeout(() => {
      if (!redirectTriggered) performRedirect();
    }, 5500);
    window.addEventListener("beforeunload", () => clearTimeout(fallback));
  })();
</script>
</body>
</html>
